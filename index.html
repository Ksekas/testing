<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>testt - QR Accessible Site</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        #qrcode {
            display: inline-block;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            margin: 20px 0;
        }
        .info {
            color: #555;
            margin-top: 20px;
            line-height: 1.6;
        }
        .url-display {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            margin: 15px 0;
            font-family: monospace;
            color: #667eea;
        }
        .button-group {
            margin-top: 25px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #764ba2;
        }
        .download-btn {
            background: #48bb78;
        }
        .download-btn:hover {
            background: #38a169;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 testt</h1>
        <p class="subtitle">QR Code Accessible Site</p>
        
        <p class="info">Scan the QR code below to access this site:</p>
        
        <div id="qrcode"></div>
        
        <div class="url-display" id="urlDisplay">Loading...</div>
        
        <div class="info">
            <p>This QR code redirects to this page, making it easy to share and access via mobile devices.</p>
        </div>
        
        <div class="button-group">
            <button onclick="downloadQR()">📥 Download QR Code</button>
            <button onclick="copyToClipboard()">📋 Copy URL</button>
        </div>
    </div>

    <script>
        // Get the current site URL
        const siteUrl = window.location.href;
        document.getElementById('urlDisplay').textContent = siteUrl;

        // Generate QR code
        const qrcode = new QRCode(document.getElementById('qrcode'), {
            text: siteUrl,
            width: 256,
            height: 256,
            colorDark: '#667eea',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'testt-qr-code.png';
            link.click();
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(siteUrl).then(() => {
                alert('URL copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy URL');
            });
        }
    </script>
</body>
</html>
